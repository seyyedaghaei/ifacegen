name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: |
          go test ./...

      - name: Run go vet
        run: |
          go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Pin to a release built with Go >= 1.26 (required for go 1.26 modules).
          version: v2.11.3
          args: --timeout=5m

      - name: Check CHANGELOG.md is up to date
        run: |
          set -euo pipefail
          git fetch --tags --force
          TAG="$(git tag -l 'v*' | sort -V | tail -n 1)"
          if [[ -z "${TAG}" ]]; then
            echo "No v* tags found; skipping CHANGELOG check."
            exit 0
          fi
          bash scripts/update_changelog.sh "${TAG}" >/dev/null
          git diff --exit-code -- CHANGELOG.md

