name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Update CHANGELOG.md
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Generate/update changelog for this tag.
          bash scripts/update_changelog.sh "$TAG"

          # If changelog changed, commit and push to main.
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs: update changelog for $TAG" || true
            git push origin HEAD:main
          else
            echo "CHANGELOG.md unchanged; skipping commit."
          fi

      - name: Build binaries (single job)
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${GITHUB_REF_NAME:-dev}"
          PKG="./cmd/ifacegen"

          build_one() {
            local goos="$1"
            local goarch="$2"
            local out="dist/ifacegen-${goos}-${goarch}"
            local ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            echo "Building ${goos}/${goarch}..."
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${out}${ext}" "${PKG}"
          }

          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64
          build_one windows amd64
          build_one windows 386

          (cd dist && sha256sum * > sha256sums.txt)

      - name: Create GitHub release (and upload artifacts)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*

